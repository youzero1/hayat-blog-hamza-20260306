version: '3.8'

services:
  hayat-blog:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    volumes:
      - ./data:/app/data
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - DATABASE_PATH=./data/hayat-blog.db
      - NEXT_PUBLIC_SITE_NAME=Hayat Blog
      - NEXT_PUBLIC_SITE_URL=http://localhost:3000
      - ADMIN_PASSWORD=admin123
    restart: unless-stopped
