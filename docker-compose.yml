version: '3.8'

services:
  hayat-blog:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - DATABASE_PATH=/app/data/hayat-blog.sqlite
      - NEXT_PUBLIC_SITE_NAME=Hayat Blog
      - NEXT_PUBLIC_SITE_DESCRIPTION=A modern blog platform for sharing stories and ideas
      - NEXT_PUBLIC_BASE_URL=http://localhost:3000
    volumes:
      - blog_data:/app/data
    restart: unless-stopped

volumes:
  blog_data:
